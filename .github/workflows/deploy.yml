# Build static Astro image for ARM64 and push to GHCR for Komodo on Pi.
# Optional GitHub Secrets: KOMODO_WEBHOOK_URL, KOMODO_WEBHOOK_SECRET (X-Hub-Signature-256).

name: Build and Push to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase repo name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}:latest
            ghcr.io/${{ env.REPO_LC }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify Komodo webhook
        if: success()
        continue-on-error: true
        env:
          KOMODO_WEBHOOK_URL: ${{ secrets.KOMODO_WEBHOOK_URL }}
          KOMODO_WEBHOOK_SECRET: ${{ secrets.KOMODO_WEBHOOK_SECRET }}
        run: |
          if [ -z "$KOMODO_WEBHOOK_URL" ]; then
            echo "KOMODO_WEBHOOK_URL not set, skipping webhook"
            exit 0
          fi
          if [ -z "$KOMODO_WEBHOOK_SECRET" ]; then
            echo "KOMODO_WEBHOOK_SECRET not set; Komodo requires X-Hub-Signature-256, skipping webhook"
            exit 0
          fi
          echo "Notifying Komodo (GitHub-style signature)"
          BODY="{\"ref\":\"${{ github.sha }}\",\"image\":\"ghcr.io/${{ env.REPO_LC }}:latest\"}"
          SIG=$(echo -n "$BODY" | openssl dgst -sha256 -hmac "$KOMODO_WEBHOOK_SECRET" | awk '{print "sha256="$2}')
          curl -sS -X POST --connect-timeout 10 --max-time 15 "$KOMODO_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$BODY" \
            --fail-with-body || true
